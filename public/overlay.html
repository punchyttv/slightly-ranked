<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Slightly Ranked Overlay</title>

  <link rel="stylesheet" href="style.css?v=7">
</head>

<body class="transparent">

  <!-- This card stays hidden until a viewer action happens -->
  <div id="overlay" class="overlay hidden">

    <section class="rank-card">

      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div id="title" class="title">
        XP GAINED
      </div>

      <div class="subtitle">
        <span id="username">@Viewer</span>
        <span id="actionText">earned XP!</span>
      </div>

      <div class="rank-stage">

        <div class="wings left"></div>

        <img
          id="rankImg"
          class="rank-img"
          src=""
          alt="Viewer rank"
        >

        <div class="wings right"></div>

      </div>

      <div id="rankName" class="rank-name">
        BRONZE I
      </div>

      <div id="xpLine" class="xp-line">
        +0 XP
      </div>

      <div class="progress-wrap">
        <div
          id="progressBar"
          class="progress-bar"
        ></div>
      </div>

      <div id="nextLine" class="next-line">
        Next Rank
      </div>

      <div id="confetti" class="confetti"></div>

    </section>

  </div>

  <!-- Leaderboard stays visible -->
  <section id="leaderboard" class="leaderboard">
    <h2>TOP 10 VIEWERS</h2>
    <div id="leaderRows"></div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js?v=7"></script>

</body>
</html>
