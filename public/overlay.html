<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slightly Ranked Overlay</title>

  <link rel="stylesheet" href="style.css">

  <script src="/socket.io/socket.io.js"></script>
</head>

<body class="transparent">

  <div id="overlay" class="overlay">

    <section class="rank-card">

      <div id="confetti" class="confetti"></div>

      <div id="title" class="title">
        RANK UP!
      </div>

      <div class="subtitle">
        <span id="username">@Viewer</span>
        <span id="actionText">just ranked up!</span>
      </div>

      <div class="rank-stage">

        <div class="wings left"></div>

        <img
          id="rankImg"
          class="rank-img"
          src=""
          alt="Rank">

        <div class="wings right"></div>

      </div>

      <div id="rankName" class="rank-name">
        BRONZE I
      </div>

      <div id="xpLine" class="xp-line">
        +25 XP
      </div>

      <div class="progress-wrap">
        <div
          id="progressBar"
          class="progress-bar">
        </div>
      </div>

      <div
        id="nextLine"
        class="next-line">
        Next Rank
      </div>

    </section>

  </div>

  <section class="leaderboard hidden-small">
    <h2>TOP 10 VIEWERS</h2>
    <div id="leaderRows"></div>
  </section>

  <script src="script.js?v=4"></script>

</body>
</html>
